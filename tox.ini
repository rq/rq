[tox]
isolated_build = True
envlist=py310,py311,py312,py313

[testenv]
commands=pytest --cov rq --cov-config=.coveragerc --durations=5 {posargs}
deps=
    codecov
    psutil
    pytest
    pytest-cov
passenv=
    TEST_HOST
    TEST_PORT
    TEST_WITH_SSL
    RUN_CLUSTER_TESTS
    RUN_SLOW_TESTS_TOO

; [testenv:lint]
; basepython = python3.10
; deps =
;     ruff
; commands =
;     ruff check rq tests

[testenv:py310]
skipdist = True
basepython = python3.10
deps = {[testenv]deps}

[testenv:py311]
skipdist = True
basepython = python3.11
deps = {[testenv]deps}

[testenv:py312]
skipdist = True
basepython = python3.12
deps = {[testenv]deps}

[testenv:py313]
skipdist = True
basepython = python3.13
deps = {[testenv]deps}

[pytest]
filterwarnings = ignore::pytest.PytestUnhandledThreadExceptionWarning
