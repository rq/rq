name: Valkey Test

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  valkey-test:
    # Descriptive name for the job runs in the UI
    name: Py${{ matrix.python-version }}/Valkey${{ matrix.valkey-version }}/redis-py${{ matrix.redis-py-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Define the service container for Valkey
    services:
      valkey:
        # Use the official Valkey image
        image: valkey/valkey:${{ matrix.valkey-version }}
        # Map port 6379 in the container to port 6379 on the runner host
        ports:
          - 6379:6379
        # Add a health check to wait for Valkey to be ready
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        valkey-version: ["7.2", "8.0", "9.0"]
        redis-py-version: ["5", "6", "7", "8"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch
          hatch run test:python -m ensurepip --upgrade
          hatch run test:python -m pip install redis==${{ matrix.redis-py-version }}

      - name: Run RQ tests with pytest
        run: |
          sudo apt-get update && sudo apt-get install -y tini
          RUN_SLOW_TESTS_TOO=1 tini -s -w hatch -- run test:cov --durations=5
        env:
          # Ensure tests connect to the Valkey service container if needed
          VALKEY_HOST: localhost # Use VALKEY_HOST if RQ tests check for it, otherwise REDIS_HOST is likely used
          VALKEY_PORT: 6379

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }} # Store your Codecov token in secrets

  cluster-valkey:
    name: Py${{ matrix.python-version }}/Valkey${{ matrix.valkey-version }}/redis-py${{ matrix.redis-py-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      # in order to get some intuition about what's going on locally, one can limit the parallel
      # test matrix execution
      # max-parallel: 1
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        valkey-version: ["7.2", "8.0", "9.0"]
        redis-py-version: ["8"]
    env:
      # allow concurrency also when running under act locally with the same docker
      # daemon for convenience
      VALKEY_CONTAINER_PREFIX: "job-${{ matrix.python-version }}-${{ matrix.valkey-version }}-${{ matrix.redis-py-version }}-valkey-"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create three-node Cluster
        run: |
          set -x
          valkey-cli() {
            docker run --rm valkey/valkey:${{ matrix.valkey-version }} valkey-cli "$@"
          }
          get_container_ip() {
            docker inspect  -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' "$1"
          }
          for i in {1,2,3}; do
            docker run --name "${VALKEY_CONTAINER_PREFIX}${i}" --rm -d valkey/valkey:${{ matrix.valkey-version }} \
              --cluster-enabled yes --cluster-node-timeout 5000 \
              --cluster-config-file /tmp/nodes.conf --appendonly no
          done
          valkey_1=$(get_container_ip "${VALKEY_CONTAINER_PREFIX}1")
          valkey_2=$(get_container_ip "${VALKEY_CONTAINER_PREFIX}2")
          valkey_3=$(get_container_ip "${VALKEY_CONTAINER_PREFIX}3")
          for container in ${valkey_1} ${valkey_2} ${valkey_3}; do
            until valkey-cli -h ${container} -p 6379 ping; do sleep 1; done
          done
          valkey-cli --cluster create $valkey_1:6379 $valkey_2:6379 $valkey_3:6379 --cluster-replicas 0 --cluster-yes
          until [ "$(valkey-cli -h $valkey_1 -p 6379 cluster info | grep -c cluster_state:ok)" -ge 1 ]; do sleep 1; done
          # export the first node's IP to the env, so that the test runner can use it
          echo "valkey_1=${valkey_1}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch "virtualenv<20.27"
          hatch run test:python -m ensurepip --upgrade
          hatch run test:python -m pip install redis==${{ matrix.redis-py-version }}

      - name: Test with pytest
        run: |
          set -x
          # use tiny for sub-reaping, so that we don't run into inconvenient "zombiefication" during testing. 
          # for a more detailed explanation see the comment in `WorkerShutdownTestCase.test_work_horse_force_death`.
          sudo apt-get update && sudo apt-get install -y tini
          RUN_SLOW_TESTS_TOO=1 VALKEY_CLUSTER_HOST=${valkey_1} tini -s -w hatch -- run test:cov --durations=5

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
