name: Valkey Test

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


env:
  CLI_COMMAND: "valkey-cli"
  IMAGE_NAME: "valkey/valkey"  # Use the official Valkey image


jobs:
  valkey-test:
    # Descriptive name for the job runs in the UI
    name:
      "Py${{ matrix.python-version }}/Valkey${{ matrix.valkey-version }}\
       ${{ matrix.variant }}/redis-py${{ matrix.redis-py-version }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      # in order to get some intuition about what's going on locally, one can limit the parallel
      # test matrix execution
      # max-parallel: 1
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        valkey-version: ["7.2", "8.0", "9.0"]
        redis-py-version: ["5", "6", "7", "8"]
        variant: [ "ssl", "" ]

    env:
      # allow concurrency also when running under act locally with the same docker
      # daemon for convenience
      CONTAINER_PREFIX:
        "job-${{ matrix.python-version }}-${{ matrix.valkey-version }}\
        -${{ matrix.redis-py-version }}-valkey${{ matrix.variant }}-"

      # test settings
      NODE_TYPE: "standalone"
      RUN_CLUSTER_TESTS: "0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create single-node
        run: |
          set -x
          if [ "${{ matrix.variant }}" == "ssl" ]; then
            USE_SSL=true
            echo "TEST_WITH_SSL=1" >> "${GITHUB_ENV}"
          fi

          export NODE_IMAGE="${IMAGE_NAME}:${{ matrix.valkey-version }}" \
            SSL_PATH="$(pwd)/tests/ssl_config" CONTAINER_PREFIX USE_SSL

          bash tests/bootstrap_redis.sh
          TEST_HOST=$(cat /tmp/test_host)
          echo "TEST_HOST=${TEST_HOST}" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch
          hatch run test:python -m ensurepip --upgrade
          hatch run test:python -m pip install redis==${{ matrix.redis-py-version }}

      - name: Run RQ tests with pytest
        run: |
          set -x
          # use tiny for sub-reaping, so that we don't run into inconvenient "zombiefication" during testing. 
          # for a more detailed explanation see the comment in `WorkerShutdownTestCase.test_work_horse_force_death`.
          sudo apt-get update && sudo apt-get install -y tini
          export TEST_WITH_SSL TEST_HOST TEST_PORT RUN_CLUSTER_TESTS
          RUN_SLOW_TESTS_TOO=1 tini -s -w hatch -- run test:cov --durations=5 -v -s

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }} # Store your Codecov token in secrets

  cluster-valkey:
    name:
      "Cluster/Py${{ matrix.python-version }}/Valkey${{ matrix.valkey-version }}\
       ${{ matrix.valkey-variant }}/redis-py${{ matrix.redis-py-version }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      # in order to get some intuition about what's going on locally, one can limit the parallel
      # test matrix execution
      # max-parallel: 1
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        valkey-version: ["7.2", "8.0", "9.0"]
        redis-py-version: ["8"]
        variant: [ "ssl", "" ]

    env:
      # allow concurrency also when running under act locally with the same docker
      # daemon for convenience
      CONTAINER_PREFIX:
        "cluster-job-${{ matrix.python-version }}-${{ matrix.valkey-version }}\
        -${{ matrix.redis-py-version }}-valkey${{ matrix.variant }}-"

      # test settings
      NODE_TYPE: "cluster"
      RUN_CLUSTER_TESTS: "1"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create three-node Cluster
        run: |
          set -x
          if [ "${{ matrix.variant }}" == "ssl" ]; then
            USE_SSL=true
            echo "TEST_WITH_SSL=1" >> "${GITHUB_ENV}"
          fi

          export NODE_IMAGE="${IMAGE_NAME}:${{ matrix.valkey-version }}" \
            SSL_PATH="$(pwd)/tests/ssl_config" CONTAINER_PREFIX USE_SSL

          bash tests/bootstrap_redis.sh
          TEST_HOST=$(cat /tmp/test_host)
          echo "TEST_HOST=${TEST_HOST}" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch "virtualenv<20.27"
          hatch run test:python -m ensurepip --upgrade
          hatch run test:python -m pip install redis==${{ matrix.redis-py-version }}

      - name: Run RQ tests with pytest
        run: |
          set -x
          # use tiny for sub-reaping, so that we don't run into inconvenient "zombiefication" during testing. 
          # for a more detailed explanation see the comment in `WorkerShutdownTestCase.test_work_horse_force_death`.
          sudo apt-get update && sudo apt-get install -y tini
          export TEST_WITH_SSL TEST_HOST TEST_PORT RUN_CLUSTER_TESTS
          RUN_SLOW_TESTS_TOO=1 tini -s -w hatch -- run test:cov --durations=5 -v -s

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
