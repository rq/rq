name: Test

on:
  push:
    branches:
      - master
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.rst"

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ssl-test:
    name: Run SSL tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build the Docker test image for tox
        uses: docker/build-push-action@v6
        with:
          file: tests/Dockerfile
          tags: rqtest-image:latest
          push: false
      - name: Launch tox SSL env only (will only run SSL specific tests)
        uses: addnab/docker-run-action@v3
        with:
          image: rqtest-image:latest
          run: stunnel & redis-server & RUN_SSL_TESTS=1 hatch run tox run -e ssl

  test:
    name: Python${{ matrix.python-version }}/Redis${{ matrix.redis-version }}/redis-py${{ matrix.redis-py-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # A curated covering set rather than a full cartesian product: RQ uses a
    # small, stable set of Redis commands, so the server version axis rarely
    # changes behavior. Every Python, every Redis and every redis-py version is
    # exercised at least once, plus the RESP3-negotiation and minimum-supported
    # boundary combinations.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python-version: "3.14", redis-version: 8, redis-py-version: 8 }
          - { python-version: "3.14", redis-version: 7, redis-py-version: 8 }
          - { python-version: "3.14", redis-version: 6, redis-py-version: 6 }
          # Redis 5 predates HELLO, so it only works with redis-py 5 (RESP2)
          - { python-version: "3.14", redis-version: 5, redis-py-version: 5 }
          - { python-version: "3.13", redis-version: 8, redis-py-version: 8 }
          - { python-version: "3.13", redis-version: 8, redis-py-version: 6 }
          - { python-version: "3.12", redis-version: 7, redis-py-version: 6 }
          - { python-version: "3.13", redis-version: 7, redis-py-version: 7 }
          - { python-version: "3.12", redis-version: 8, redis-py-version: 5 }
          - { python-version: "3.11", redis-version: 6, redis-py-version: 5 }
          - { python-version: "3.11", redis-version: 8, redis-py-version: 8 }
          - { python-version: "3.10", redis-version: 8, redis-py-version: 8 }
          # Minimum-supported floor
          - { python-version: "3.10", redis-version: 5, redis-py-version: 5 }

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Start Redis
        uses: supercharge/redis-github-action@1.8.1
        with:
          redis-version: ${{ matrix.redis-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch "virtualenv<20.27"
          hatch run test:python -m ensurepip --upgrade
          hatch run test:python -m pip install redis==${{ matrix.redis-py-version }}

      - name: Test with pytest
        run: |
          RUN_SLOW_TESTS_TOO=1 hatch run test:cov --durations=5
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  mypy:
    runs-on: ubuntu-latest
    name: Type check

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch "virtualenv<20.27"

      - name: Run Test
        run: |
          hatch run test:typing
