name: Test

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ssl-test:
    name: Run SSL tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build the Docker test image for tox
        uses: docker/build-push-action@v6
        with:
          file: tests/Dockerfile
          tags: rqtest-image:latest
          push: false
      - name: Launch tox SSL env only (will only run SSL specific tests)
        uses: addnab/docker-run-action@v3
        with:
          image: rqtest-image:latest
          run: stunnel & redis-server & RUN_SSL_TESTS=1 hatch run tox run -e ssl

  test:
    name: Python${{ matrix.python-version }}/Redis${{ matrix.redis-version }}/redis-py${{ matrix.redis-py-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        redis-version: [5, 6, 7, 8]
        redis-py-version: [5, 6, 8]
        exclude:
          # redis-py 8 defaults to RESP3, which negotiates via the HELLO command.
          # HELLO was added in Redis 6.0, so redis-py 8 cannot connect to Redis 5.
          - redis-version: 5
            redis-py-version: 8

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Start Redis
        uses: supercharge/redis-github-action@1.8.1
        with:
          redis-version: ${{ matrix.redis-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch "virtualenv<20.27"
          hatch run test:python -m ensurepip --upgrade
          hatch run test:python -m pip install redis==${{ matrix.redis-py-version }}

      - name: Test with pytest
        run: |
          RUN_SLOW_TESTS_TOO=1 hatch run test:cov --durations=5
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  cluster-test:
    name: Python${{ matrix.python-version }}/Redis${{ matrix.redis-version }}/redis-py${{ matrix.redis-py-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      # in order to get some intuition about what's going on locally, one can limit the parallel
      # test matrix execution
      # max-parallel: 1
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
        redis-version: [ 6, 7, 8 ]
        redis-py-version: [ 8 ]
    env:
      # allow concurrency also when running under act locally with the same docker
      # daemon for convenience
      REDIS_CONTAINER_PREFIX: "job-${{ matrix.python-version }}-${{ matrix.redis-version }}-${{ matrix.redis-py-version }}-redis-"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create three-node Cluster
        run: |
          set -x
          redis-cli() {
            docker run --rm redis:${{ matrix.redis-py-version }} redis-cli "$@"
          }
          get_container_ip() {
            docker inspect  -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' "$1"
          }
          for i in {1,2,3}; do
            docker run --name "${REDIS_CONTAINER_PREFIX}${i}" --rm -d redis:${{ matrix.redis-version }} \
              --cluster-enabled yes --cluster-node-timeout 5000 \
              --cluster-config-file /tmp/nodes.conf --appendonly no
          done
          redis_1=$(get_container_ip "${REDIS_CONTAINER_PREFIX}1")
          redis_2=$(get_container_ip "${REDIS_CONTAINER_PREFIX}2")
          redis_3=$(get_container_ip "${REDIS_CONTAINER_PREFIX}3")
          for container in ${redis_1} ${redis_2} ${redis_3}; do
            until redis-cli -h ${container} -p 6379 ping; do sleep 1; done
          done
          redis-cli --cluster create $redis_1:6379 $redis_2:6379 $redis_3:6379 --cluster-replicas 0 --cluster-yes
          until [ "$(redis-cli -h $redis_1 -p 6379 cluster info | grep -c cluster_state:ok)" -ge 1 ]; do sleep 1; done
          # export the first node's IP to the env, so that the test runner can use it
          echo "redis_1=${redis_1}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch "virtualenv<20.27"
          hatch run test:python -m ensurepip --upgrade
          hatch run test:python -m pip install redis==${{ matrix.redis-py-version }}

      - name: Test with pytest
        run: |
          set -x
          RUN_SLOW_TESTS_TOO=1 REDIS_CLUSTER_HOST=${redis_1} hatch run test:cov tests/test_worker.py --durations=5

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  mypy:
    runs-on: ubuntu-latest
    name: Type check

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch "virtualenv<20.27"

      - name: Run Test
        run: |
          hatch run test:typing
